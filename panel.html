<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SIU Guaraní — Panel Académico</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family: Arial, Helvetica, sans-serif;background:#f2f4f6;color:#222;}

/* TOPBAR */
.topbar {
  width:100%;
  background:#ffffff;
  border-bottom:1px solid #dcdcdc;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 12px;
}

.topbar-left{
  display:flex;
  align-items:center;
}

.logo-img{
  width:45px;
  height:45px;
  object-fit:contain;
}

/* BOTONES ARRIBA (ARREGLADO) */
.topbar-actions{
  display:flex;
  align-items:center;
  gap:6px;
}

.topbar-actions button{
  display:flex;
  align-items:center;
  justify-content:center;
  height:36px;
  min-width:36px;
  padding:0 8px;
  border-radius:4px;
  border:1px solid #dcdcdc;
  background:#f7f7f7;
  cursor:pointer;
  gap:4px;
}

.topbar-actions button:hover{
  background:#ececec;
}

.icon{
  width:18px;
  height:18px;
  fill:#444;
}

.mail-count{
  color:#0073aa;
  font-weight:600;
  font-size:13px;
}

/* MENU PRINCIPAL */
.menu {
  width:100%;
  background:#ffffff;
  display:none;
  flex-direction:column;
}

.menu-item {
  padding:18px 24px;
  font-size:20px;
  font-weight:600;
  color:#333;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
}

.submenu{
  display:none;
  flex-direction:column;
  background:#f7f7f7;
  padding-left:28px;
}

.submenu-item{
  padding:6px 0;
  font-size:17px;
}

.menu-item:hover{background:#f3f3f3;}
.submenu-item:hover{background:#e9e9e9;}

/* CONTENIDO (NO SE TOCA) */
.container{
  width:92%;
  max-width:750px;
  margin:18px auto;
}

.card{
  background:#fff;
  border:1px solid #d0d0d0;
  padding:18px;
  border-radius:4px;
}

/* DROPDOWN USUARIO (ARREGLADO SIN ROMPER) */
.user-dropdown {
  position:absolute;
  top:55px;
  right:10px;
  width:260px;
  background:#fff;
  border:1px solid #dcdcdc;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
  display:none;
  z-index:999;
  font-size:14px;
}

.user-header{
  padding:12px;
  font-weight:700;
  background:#f7f7f7;
  border-bottom:1px solid #eee;
}

.user-section{
  padding:10px 12px;
  border-bottom:1px solid #eee;
}

.user-section-title{
  font-size:13px;
  color:#666;
  font-weight:700;
  margin-bottom:5px;
}

.user-item{
  padding:10px 12px;
  cursor:pointer;
}

.user-item:hover{
  background:#f2f2f2;
}

/* TU CONTENIDO ORIGINAL */
.header-box{
  background:#eef6fb;
  border:1px solid #dbe8ef;
  padding:10px 12px;
  border-radius:4px;
  margin-bottom:15px;
}

.header-box-title{
  color:#1686b6;
  font-size:14px;
  margin-bottom:6px;
  font-weight:700;
}

.red{
  color:#cc0000;
  font-weight:700;
  margin-bottom:10px;
}

.title{
  font-weight:700;
  color:#666;
  margin-top:12px;
}

ul{
  padding-left:20px;
}

select{
  width:100%;
  padding:8px;
  border-radius:4px;
  border:1px solid #d6dae0;
}

.exam-msg{
  background:#eef5fb;
  border-top:1px solid #c9dae7;
  padding:10px 12px;
  color:#0b6fb8;
  margin-top:6px;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <img src="logo-uns.png" class="logo-img">
  </div>

  <div class="topbar-actions">

    <!-- USUARIO -->
    <button id="userBtn">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-8 1.7-8 4v2h16v-2c0-2.3-4.7-4-8-4z"/>
      </svg>
      <span style="font-size:12px;color:#555;">▾</span>
    </button>

    <!-- MAIL -->
    <button>
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M2 6h20l-10 7L2 6zm0 2v10h20V8l-10 7L2 8z"/>
      </svg>
      <span class="mail-count">0</span>
    </button>

    <!-- MENU -->
    <button id="menuBtn">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
      </svg>
    </button>

  </div>
</div>

<!-- DROPDOWN -->
<div id="userMenu" class="user-dropdown">
  <div class="user-header">JEREMIAS VISCONTI</div>

  <div class="user-section">
    <div class="user-section-title">CARRERAS</div>
    <div class="user-item">✔ (IC) INGENIERÍA CIVIL</div>
  </div>

  <div class="user-item">⚙ Configuración</div>
  <div class="user-item" onclick="location.href='index.html'">⏻ Cerrar sesión</div>
</div>

<!-- CONTENIDO (NO SE ROMPE) -->
<main class="container">
<h2 style="color:#1686b6;">Bienvenido</h2>

<div class="card">
<div class="header-box">

<div class="header-box-title">Calendario Académico</div>
<div class="red">Actualizá tu MAIL</div>

<div class="title">Inscripciones</div>
<ul>
<li>101 - Matemáticas</li>
<li>102 - Física</li>
</ul>

<div class="title">Cursadas</div>
<select><option>2026 - Segundo Cuatr.</option></select>

<p><b>Inicio:</b> 18/08/2026</p>

<div class="title">Inscripciones</div>
<div class="exam-msg">No tenés inscripciones.</div>

</div>
</div>
</main>

<script>
document.getElementById("menuBtn").onclick = ()=>{
  const menu=document.getElementById("menu");
  if(menu) menu.style.display = menu.style.display==="flex" ? "none" : "flex";
};

document.getElementById("userBtn").onclick = function(e){
  e.stopPropagation();
  const m=document.getElementById("userMenu");
  m.style.display = m.style.display==="block" ? "none" : "block";
};

document.addEventListener("click", ()=>{
  document.getElementById("userMenu").style.display="none";
});
</script>

</body>
</html>
