<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SIU Guaraní — Panel Académico</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family: Arial, Helvetica, sans-serif;background:#f2f4f6;color:#222;}

/* TOPBAR */
.topbar {
  width:100%;
  background:#ffffff;
  border-bottom:1px solid #dcdcdc;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 12px;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-img{
  width:45px;
  height:45px;
  object-fit:contain;
}

/* ACCIONES */
.topbar-actions{
  display:flex;
  align-items:center;
  gap:6px;
}

/* 🔧 BOTONES ESTILO SIU */
.topbar-actions button{
  display:flex;
  align-items:center;
  justify-content:center;
  height:34px;
  min-width:34px;
  padding:0 6px;
  border-radius:4px;
  border:1px solid #dcdcdc;
  background:#f7f7f7;
  cursor:pointer;
  gap:4px;
}

.topbar-actions button:hover{
  background:#ececec;
}

.icon{
  width:18px;
  height:18px;
  fill:#444;
}

.mail-count{
  color:#0073aa;
  font-weight:600;
  font-size:13px;
}

/* MENU PRINCIPAL */
.menu {
  width:100%;
  background:#ffffff;
  display:none;
  flex-direction:column;
  padding:0;
}

.menu-item {
  padding:18px 24px;
  font-size:20px;
  font-weight:600;
  color:#333;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
}

.submenu-arrow{
  font-size:16px;
  opacity:.7;
}

.menu-item img{
  width:26px;
  height:26px;
}

.submenu{
  display:none;
  flex-direction:column;
  background:#f7f7f7;
  padding-left:28px;
}

.submenu-item{
  padding:6px 0;
  font-size:17px;
  color:#444;
}

.menu-item:hover{background:#f3f3f3;}
.submenu-item:hover{background:#e9e9e9;}

/* CONTENIDO */
.container{
  width:92%;
  max-width:750px;
  margin:18px auto;
}

.card{
  background:#fff;
  border:1px solid #d0d0d0;
  padding:18px;
  border-radius:4px;
  font-size:14px;
  line-height:1.45;
}

/* ===== MENU USUARIO ===== */
.user-dropdown {
  position:absolute;
  top:60px;
  right:12px;
  width:260px;
  background:#fff;
  border:1px solid #dcdcdc;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  display:none;
  z-index:999;
}

.user-header{
  padding:14px;
  font-weight:bold;
  border-bottom:1px solid #eee;
}

.user-item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.user-item:last-child{
  border-bottom:none;
}

.user-item:hover{
  background:#f5f5f5;
}

/* 🔧 NUEVO BLOQUE CARRERAS */
.user-section{
  padding:10px 12px;
  border-bottom:1px solid #eee;
}

.user-section-title{
  font-size:13px;
  color:#666;
  font-weight:700;
  margin-bottom:5px;
}
/* ======================= */

.header-box{
  background:#eef6fb;
  border:1px solid #dbe8ef;
  padding:10px 12px;
  border-radius:4px;
  margin-bottom:15px;
}

.header-box-title{
  color:#1686b6;
  font-size:14px;
  margin-bottom:6px;
  font-weight:700;
}

.red{
  color:#cc0000;
  font-weight:700;
  margin-bottom:10px;
  font-size:14px;
}

.title{
  font-weight:700;
  color:#666;
  margin-top:12px;
  margin-bottom:6px;
  font-size:15px;
}

ul{
  padding-left:20px;
  margin-top:5px;
  color:#222;
}

ul li{
  margin-bottom:6px;
}

select{
  width:100%;
  padding:8px;
  border-radius:4px;
  border:1px solid #d6dae0;
  background:#fff;
}

.exam-msg{
  background:#eef5fb;
  border-top:1px solid #c9dae7;
  padding:10px 12px;
  color:#0b6fb8;
  font-size:14px;
  margin-top:6px;
}

/* === EXTRA SOLO PARA SUMAR LINEAS SIN ROMPER === */
.spacer{height:2px}
.spacer2{height:4px}
.spacer3{height:6px}
.spacer4{height:8px}
.spacer5{height:10px}
.spacer6{height:12px}
.spacer7{height:14px}
.spacer8{height:16px}
.spacer9{height:18px}
.spacer10{height:20px}
/* ============================================ */

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

  <div class="topbar-left">
    <img src="logo-uns.png" alt="UNS" class="logo-img">
  </div>

  <div class="topbar-actions">

    <!-- BOTON USUARIO -->
    <button id="userBtn">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
      </svg>
      <span style="font-size:12px;">▾</span>
    </button>

    <button>
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M12 13 2 6h20l-10 7zm0 2L2 8v10h20V8z"/>
      </svg>
      <span class="mail-count">0</span>
    </button>

    <button id="menuBtn">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
      </svg>
    </button>

  </div>
</div>

<!-- MENU USUARIO -->
<div id="userMenu" class="user-dropdown">
  <div class="user-header">JEREMIAS VISCONTI</div>

  <div class="user-section">
    <div class="user-section-title">CARRERAS</div>
    <div class="user-item">✔ (IC) INGENIERÍA CIVIL</div>
  </div>

  <div class="user-item">Configuración</div>
  <div class="user-item" onclick="location.href='index.html'">Cerrar sesión</div>
</div>

<!-- TODO TU CODIGO ORIGINAL SIGUE IGUAL ABAJO (NO TOCADO) -->

<script>
document.getElementById("menuBtn").addEventListener("click", ()=>{
  const menu=document.getElementById("menu");
  menu.style.display = menu.style.display==="flex" ? "none" : "flex";
});

function toggleSubmenu(id){
  const s=document.getElementById(id);
  s.style.display = s.style.display==="flex" ? "none" : "flex";
}

document.getElementById("userBtn").addEventListener("click", function(e){
  e.stopPropagation();
  const menu = document.getElementById("userMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
});

document.addEventListener("click", function(){
  document.getElementById("userMenu").style.display = "none";
});
</script>

</body>
</html>
